<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MVP FAMILY</title>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:"PingFang SC","Microsoft YaHei",sans-serif;

/* 鲜艳背景 */
background:
radial-gradient(circle at 20% 20%, #ff7aa2 0%, transparent 40%),
radial-gradient(circle at 80% 20%, #6edcff 0%, transparent 40%),
radial-gradient(circle at 50% 90%, #7af3c7 0%, transparent 45%),
linear-gradient(135deg,#7be0ff,#7af3c7,#ffd36e);
}

/* 海报卡片 */

.poster{
width:92%;
max-width:520px;
background:rgba(255,255,255,0.55);
padding:14px;
border-radius:20px;
backdrop-filter: blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* 海报图片 */

.poster img{
width:100%;
border-radius:12px;
display:block;
}

</style>
</head>

<body>

<div class="poster">

<img src="MVPdashijian03.JPEG">

</div>

</body>
</html>
